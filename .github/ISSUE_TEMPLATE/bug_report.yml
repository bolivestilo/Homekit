name: Bug Report
    description: Report a bug in Homekit CLI, MCP server, or @openclaw plugin
    title: "[Bug]: "
    labels: ["bug", "needs-triage"]
    assignees: ["bolivestilo"]

    body:
      - type: markdown
        attributes:
          value: Thanks for reporting a bug! Please fill out the form below.

      - type: checkboxes
        id: preflight
        attributes:
          label: Pre-flight checklist
          options:
            - label: I searched existing issues and this is not a duplicate
              required: true
            - label: I have updated to the latest version
              required: true

      - type: dropdown
        id: component
        attributes:
          label: Affected component
          options:
            - homekit-cli (CLI)
            - homekit-mcp (MCP Server)
            - "@openclaw/homekit (Plugin)"
            - macOS App
            - Documentation
        validations:
          required: true

      - type: input
        id: version
        attributes:
          label: Version
          placeholder: "1.0.0"
        validations:
          required: true

      - type: input
        id: os
        attributes:
          label: macOS version
          placeholder: "macOS 14.5 Sonoma"
        validations:
          required: true

      - type: textarea
        id: description
        attributes:
          label: What happened?
        validations:
          required: true

      - type: textarea
        id: reproduction
        attributes:
          label: Steps to reproduce
        validations:
          required: true

      - type: textarea
        id: expected
        attributes:
          label: Expected behavior
        validations:
          required: true

      - type: textarea
        id: logs
        attributes:
          label: Logs
          render: shell
    